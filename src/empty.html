<!DOCTYPE html>
<html lang="uz">

<head>
    @@include('components/layout/head.html')
</head>

<body>
    @@include('components/layout/header.html')
    @@include('components/layout/menu.html')
    @@include('components/layout/breadcrumb.html' )
    <div class="layout">
        <div class="container">
            <div class="empty content p-5 d-flex align-items-center justify-content-center flex-column gap-3">
                <img src="@/images/empty.png" width="180" height="180" alt="">
                <h4 class="text-center fs-5">Ma’lumotlar yuklanmoqda...</h4>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const header = document.querySelector('.header');
            if (!header) return;

            const threshold = 30;

            const updateHeader = () => {
                if (window.scrollY > threshold) {
                    header.classList.remove('page');
                } else {
                    header.classList.add('page');
                }
            };

            updateHeader();

            window.addEventListener('scroll', updateHeader, { passive: true });
        });
    </script>
    @@include('components/layout/footer.html')

</body>

</html>
