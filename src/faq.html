<!DOCTYPE html>
<html lang="uz">

<head>
    @@include('components/layout/head.html')
</head>

<body>
    @@include('components/layout/header.html')
    @@include('components/layout/menu.html')
    @@include('components/layout/breadcrumb.html' )
    <div class="layout">
        <div class="container">
            <section class="faq">
                <button class="faq-item active">
                    <p class="question">
                        faq
                        <i class="i-dropdown"></i>
                    </p>
                    <p class="answer">
                        faq
                    </p>
                </button>
                <button class="faq-item  ">
                    <p class="question">
                        faq
                        <i class="i-dropdown"></i>
                    </p>
                    <p class="answer">
                        faq
                    </p>
                </button>
                <button class="faq-item  ">
                    <p class="question">
                        faq
                        <i class="i-dropdown"></i>
                    </p>
                    <p class="answer">
                        faq
                    </p>
                </button>

            </section>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const header = document.querySelector('.header');
            if (!header) return;

            const threshold = 30;

            const updateHeader = () => {
                if (window.scrollY > threshold) {
                    header.classList.remove('page');
                } else {
                    header.classList.add('page');
                }
            };

            updateHeader();

            window.addEventListener('scroll', updateHeader, { passive: true });
        });
    </script>
    @@include('components/layout/footer.html')

</body>

</html>
